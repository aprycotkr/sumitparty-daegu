<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, viewport-fit=cover, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A96E;--gold-light:#E8D4A8;
  --black:#0A0A0A;--dark:#141414;--border:#242424;
  --font-display:'Cormorant Garamond',serif;--font-body:'Montserrat',sans-serif;
}
html{overflow-x:hidden;-webkit-text-size-adjust:none}
body{background:var(--black);color:#fff;font-family:var(--font-body);min-height:100vh;overflow-x:hidden}

/* ── VENUE HEADER ── */
.venue-header{
  position:relative;height:280px;overflow:hidden;
  cursor:pointer;
}
.venue-header img.vh-bg{
  width:100%;height:100%;object-fit:cover;
  filter:brightness(0.42);transition:filter 0.35s;
  display:block;
}
.venue-header:hover img.vh-bg{filter:brightness(0.52);}
.vh-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,0.15) 0%,rgba(0,0,0,0.68) 100%);
  pointer-events:none;
}
.vh-content{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  padding:20px 22px 26px;
}
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  color:rgba(255,255,255,0.78);font-size:0.83rem;font-weight:500;
  width:fit-content;transition:color 0.2s;text-decoration:none;
}
.back-btn svg{opacity:0.7;}
.venue-header:hover .back-btn{color:#fff;}
.vh-info{margin-top:auto;}
.vh-addr{
  display:flex;align-items:center;gap:5px;
  margin-bottom:9px;
}
.vh-addr span{font-size:0.76rem;color:rgba(255,255,255,0.58);font-weight:400;}
.vh-name{
  font-family:var(--font-display);
  font-size:2.1rem;font-weight:600;color:#fff;
  letter-spacing:0.02em;line-height:1.1;
}
.vh-tag{
  margin-top:7px;font-size:0.7rem;
  color:rgba(255,255,255,0.42);letter-spacing:0.08em;text-transform:uppercase;
}

/* ── CONTENT ── */
.wrap{max-width:520px;margin:0 auto;padding:26px 16px 80px;}
.sec-label{
  font-size:0.68rem;font-weight:700;
  letter-spacing:0.14em;text-transform:uppercase;
  color:var(--gold);margin-bottom:14px;
}

/* ── PARTY CARDS ── */
.party-list{display:flex;flex-direction:column;gap:10px;}
.party-card{
  background:var(--dark);border:1px solid var(--border);
  border-radius:14px;padding:18px 18px 16px;
  transition:border-color 0.2s,background 0.2s;
}
.party-card:not(.is-closed):hover{border-color:#333;background:#181818;}
.party-card.is-closed{opacity:0.4;pointer-events:none;}

.pc-top{
  display:flex;align-items:flex-start;
  justify-content:space-between;gap:10px;
  margin-bottom:13px;
}
.pc-date-col{flex:1;min-width:0;}
.pc-date{font-size:1.02rem;font-weight:600;color:#fff;margin-bottom:3px;white-space:nowrap;}
.pc-time{font-size:0.78rem;color:rgba(255,255,255,0.4);white-space:nowrap;}
.pc-badges{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.bdg-open{
  background:linear-gradient(135deg,#C9A96E,#a07840);
  color:#000;font-size:0.6rem;font-weight:800;
  padding:3px 9px;border-radius:4px;
  letter-spacing:0.08em;text-transform:uppercase;
}
.bdg-almost{
  background:rgba(255,65,25,0.13);color:#ff6040;
  border:1px solid rgba(255,65,25,0.28);
  font-size:0.6rem;font-weight:700;
  padding:3px 8px;border-radius:4px;
}
.bdg-closed-pill{
  background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.28);
  font-size:0.6rem;font-weight:600;
  padding:3px 8px;border-radius:4px;
}
.bdg-earlybird{
  background:rgba(201,169,110,0.12);color:var(--gold);
  border:1px solid rgba(201,169,110,0.35);
  font-size:0.6rem;font-weight:700;
  padding:3px 8px;border-radius:4px;
}

.pc-bottom{
  display:flex;align-items:center;
  justify-content:space-between;gap:8px;
}
.pc-seats{font-size:0.78rem;color:rgba(255,255,255,0.38);font-weight:400;}
.btn-apply{
  background:transparent;border:1px solid var(--gold);
  color:var(--gold);font-family:var(--font-body);
  font-size:0.82rem;font-weight:600;
  padding:9px 20px;border-radius:9px;cursor:pointer;
  letter-spacing:0.03em;text-decoration:none;display:inline-flex;
  align-items:center;justify-content:center;min-height:44px;
  transition:background 0.2s,color 0.2s;white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
}
.btn-apply:hover{background:var(--gold);color:#000;}
.btn-closed-label{
  font-size:0.8rem;font-weight:500;
  color:rgba(255,255,255,0.2);
  border:1px solid rgba(255,255,255,0.1);
  padding:9px 20px;border-radius:9px;
}

.loading-ph{
  text-align:center;padding:44px 0;
  color:rgba(255,255,255,0.28);font-size:0.84rem;
}

@media(max-width:480px){
  .venue-header{height:240px;}
  .vh-content{padding:16px 18px 20px;}
  .vh-name{font-size:1.7rem;}
  .wrap{padding:20px 14px 60px;}
  .party-card{padding:16px 14px 14px;}
  .pc-bottom{gap:6px;}
  .btn-apply{padding:9px 14px;font-size:0.78rem;}
  .pc-seats{font-size:0.72rem;}
}
/* ── TRUST STRIP ── */
.trust-strip{display:flex;align-items:center;justify-content:center;gap:1.5rem;padding:0.8rem 1.5rem;background:rgba(201,169,110,0.04);border-bottom:1px solid rgba(201,169,110,0.08);flex-wrap:wrap}
.trust-item{font-size:0.58rem;color:rgba(255,255,255,0.32);letter-spacing:0.07em;display:flex;align-items:center;gap:0.3rem}
.trust-item em{color:rgba(201,169,110,0.85);font-style:normal;font-weight:600}
@media(max-width:480px){.trust-strip{gap:0.7rem 1.2rem;padding:0.65rem 1rem}}

/* ── VIEWER BADGE ── */
.viewer-badge{display:flex;align-items:center;justify-content:center;gap:6px;padding:7px 16px;background:rgba(255,255,255,0.04);border-bottom:1px solid rgba(255,255,255,0.06);font-size:0.72rem;color:rgba(255,255,255,0.55);font-weight:500;letter-spacing:0.02em}
.viewer-dot{width:6px;height:6px;border-radius:50%;background:#f87171;flex-shrink:0;animation:vblink 1.8s ease infinite}
@keyframes vblink{0%,100%{opacity:1}50%{opacity:0.35}}
</style>
</head>
<body>

<!-- VENUE HEADER — click goes to party intro -->
<div class="venue-header" id="venueHeaderDiv" onclick="goToVenue()">
  <img class="vh-bg" src="대구점.jpg" alt="대구 동성로점">
  <div class="vh-overlay"></div>
  <div class="vh-content">
    <span class="back-btn" onclick="event.stopPropagation();window.location.href='daegu.html'">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      홈으로
    </span>
    <div class="vh-info">
      <div class="vh-addr">
        <span>📍 대구 중구 경상감영길 32 3층</span>
      </div>
      <div class="vh-name">대구 동성로점</div>
      <div class="vh-tag">매주 토요일 · 19:00–23:00</div>
    </div>
  </div>
</div>

<!-- TRUST STRIP -->
<div class="trust-strip">
  <span class="trust-item">👫 남20 · 여20 <em>완벽 1:1</em></span>
  <span class="trust-item">⭐ 만족도 <em>92%</em></span>
  <span class="trust-item">"혼자 와도 어색함 없어요" — 실제 참가자</span>
</div>

<!-- VIEWER BADGE -->
<div class="viewer-badge" id="viewerBadge">
  <span class="viewer-dot"></span>
  <span id="viewerCount">5</span>명이 보고 있어요!
</div>

<!-- PARTY LIST -->
<div class="wrap">
  <div class="sec-label">신청 가능한 파티</div>
  <div class="party-list" id="partyList"></div>
</div>

<script>
var DAEGU_GAS_URL = 'https://script.google.com/macros/s/AKfycbxnJhftdjyEro7uKUNTfsAKp7U1g7knABAQBeebu5mfIIkonjXcTlgRK8qUanuOZ4prxw/exec';
var OPEN_DATE = '2026-07-11';

var FIRST_PARTY = new Date('2026-07-11T00:00:00+09:00');

function getSaturdays(n) {
  var days = [];
  var d = new Date();
  d.setHours(0,0,0,0);
  var diff = (6 - d.getDay() + 7) % 7 || 7;
  d.setDate(d.getDate() + diff);
  if (d < FIRST_PARTY) d = new Date(FIRST_PARTY);
  for (var i = 0; i < n; i++) {
    days.push(new Date(d));
    d.setDate(d.getDate() + 7);
  }
  return days;
}
function toKey(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function toLabel(d){
  return (d.getMonth()+1)+'월 '+d.getDate()+'일 (토)';
}

function renderList(status){
  var list = document.getElementById('partyList');
  var sats = getSaturdays(5);
  list.innerHTML = '';

  sats.forEach(function(d, idx){
    var key = toKey(d);
    var label = toLabel(d);
    var st = status[key] || {};
    var maleSt = st.male || 'open';
    var femaleSt = st.female || 'open';
    var allClosed = maleSt==='closed' && femaleSt==='closed';
    var anyAlmost = !allClosed && (maleSt==='almost' || femaleSt==='almost');
    var isOpen = (key === OPEN_DATE);
    var hasMRem = st.maleRemaining !== undefined;
    var hasFRem = st.femaleRemaining !== undefined;
    var mRem = hasMRem ? st.maleRemaining : null;
    var fRem = hasFRem ? st.femaleRemaining : null;

    // 실제 데이터가 있는 경우에만 잔여석 표시 (부산과 동일 방식)
    var showSeats = (hasMRem || hasFRem) && ((idx === 0) || !!st.hasManualRemaining);

    var today = new Date(); today.setHours(0,0,0,0);
    var daysUntil = Math.ceil((d - today) / (1000*60*60*24));
    var isEarlybird = !isOpen && !allClosed && daysUntil > 7;

    var badges = '';
    if (allClosed) {
      badges = '<span class="bdg-closed-pill">마감</span>';
    } else {
      if (isOpen) badges += '<span class="bdg-open">OPEN 할인</span>';
      if (isEarlybird) badges += '<span class="bdg-earlybird">🏷️ 얼리버드</span>';
      if (anyAlmost) badges += '<span class="bdg-almost">마감임박</span>';
    }

    var btn = allClosed
      ? '<span class="btn-closed-label">마감</span>'
      : '<a class="btn-apply" href="daegu-party.html?date='+key+'" onclick="if(typeof fbq!==\'undefined\')fbq(\'track\',\'AddToCart\',{content_name:\'파티 날짜 선택\',content_category:\'daegu\'})">신청하기</a>';

    var seats = allClosed
      ? '모집 마감'
      : (showSeats ? '남 '+mRem+'석 · 여 '+fRem+'석 남음' : '');

    var card = document.createElement('div');
    card.className = 'party-card'+(allClosed?' is-closed':'');
    card.innerHTML =
      '<div class="pc-top">'+
        '<div class="pc-date-col">'+
          '<div class="pc-date">'+label+'</div>'+
          '<div class="pc-time">19:00–23:00</div>'+
        '</div>'+
        '<div class="pc-badges">'+badges+'</div>'+
      '</div>'+
      '<div class="pc-bottom">'+
        '<span class="pc-seats">'+seats+'</span>'+
        btn+
      '</div>';
    list.appendChild(card);
  });

  // store first available date for venue header click
  var first = sats.find(function(d){
    var k = toKey(d);
    var st2 = status[k] || {};
    return !(st2.male==='closed' && st2.female==='closed');
  });
  window._venuePartyDate = first ? toKey(first) : '';
}

function goToVenue() {
  var date = window._venuePartyDate || '';
  window.location.href = 'daegu-party.html' + (date ? '?date='+date : '');
}

(function init(){
  var cached   = localStorage.getItem('daegu_dateStatus');
  var cachedTs = Number(localStorage.getItem('daegu_dateStatus_ts') || 0);
  if (cached && Date.now() - cachedTs < 60000) { // 1분 이내 캐시만 사용
    try { renderList(JSON.parse(cached)); } catch(e) { renderList({}); }
  } else {
    renderList({});
  }
  if (!DAEGU_GAS_URL) return;
  fetch(DAEGU_GAS_URL+'?action=getDateStatus&_t='+Date.now())
    .then(function(r){return r.json();})
    .then(function(res){
      if (res.result==='success') {
        localStorage.setItem('daegu_dateStatus', JSON.stringify(res.data||{}));
        localStorage.setItem('daegu_dateStatus_ts', String(Date.now()));
        renderList(res.data||{});
      }
    })
    .catch(function(){});
})();

(function(){
  var el = document.getElementById('viewerCount');
  var cur = Math.floor(Math.random() * 7) + 3; // 3–9
  el.textContent = cur;
  function tick(){
    var delta = Math.random() < 0.5 ? 1 : -1;
    cur = Math.max(3, Math.min(9, cur + delta));
    el.textContent = cur;
    setTimeout(tick, 30000 + Math.random() * 30000); // 30–60초
  }
  setTimeout(tick, 30000 + Math.random() * 30000);
})();
</script>
</body>
</html>
